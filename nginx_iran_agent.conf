limit_req_zone $binary_remote_addr zone=agent_limit:10m rate=30r/m;

server {
    listen 80;
    server_name YOUR_IRAN_DOMAIN.COM;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_IRAN_DOMAIN.COM;

    ssl_certificate     /etc/letsencrypt/live/YOUR_IRAN_DOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_IRAN_DOMAIN.COM/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # اختیاری: فقط IP ایران مجاز
    # allow YOUR_IRAN_VPS_IP;
    # deny  all;

    location = /health {
        limit_req zone=agent_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:8765/health;
        proxy_set_header Host $host;
        proxy_read_timeout 20s;
    }

    location = /metrics {
        limit_req zone=agent_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:8765/metrics;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    location / { return 404; }

    access_log /var/log/nginx/agent_access.log;
    error_log  /var/log/nginx/agent_error.log;
}
